# Server Configuration
server.port=8080

# Cloudflare R2 Configuration - ใช้ environment variables เท่านั้น
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT}
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY}
cloudflare.r2.bucket-name=${CLOUDFLARE_R2_BUCKET_NAME}
cloudflare.r2.region=${CLOUDFLARE_R2_REGION}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Configuration
app.upload.max-file-size=10MB
app.upload.url-expiration=PT1H
app.upload.max-upload-requests-per-minute=60

# Logging
logging.level.com.example.apiupload=INFO

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized